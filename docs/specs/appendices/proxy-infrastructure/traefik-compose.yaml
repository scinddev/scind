# Traefik Docker Compose Configuration
#
# This file is generated by `contrail proxy init` and placed at:
# ~/.config/contrail/proxy/docker-compose.yaml
#
# Modifications will be overwritten by `contrail proxy init --force`

name: contrail-proxy

services:
  traefik:
    image: ${TRAEFIK_IMAGE:-traefik:v3.2.3}
    command:
      - "--configFile=/etc/traefik/traefik.yaml"
      - "--api.dashboard=true"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yaml:/etc/traefik/traefik.yaml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - ./certs:/etc/traefik/certs:ro
    networks:
      - contrail-proxy
    restart: unless-stopped
    labels:
      - "contrail.managed=true"
      - "contrail.component=proxy"

networks:
  contrail-proxy:
    external: true
