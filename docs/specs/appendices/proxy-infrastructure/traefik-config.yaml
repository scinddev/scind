# Traefik Static Configuration
#
# This file is generated by `contrail proxy init` and placed at:
# ~/.config/contrail/proxy/traefik.yaml
#
# For dynamic configuration (TLS certs, middlewares), see:
# ~/.config/contrail/proxy/dynamic/

api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: contrail-proxy
    watch: true
  file:
    directory: /etc/traefik/dynamic
    watch: true

log:
  level: INFO

accessLog: {}
