# goreleaser.yaml
# GoReleaser configuration for Contrail
#
# This file should be created based on the project's release requirements.
# See https://goreleaser.com/customization/ for configuration options.
#
# Example configuration:

# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: contrail
    main: ./cmd/contrail
    binary: contrail
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: contrail
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

brews:
  - name: contrail
    repository:
      owner: yourorg
      name: homebrew-tap
    homepage: "https://github.com/yourorg/contrail"
    description: "Workspace orchestration for Docker Compose"
    license: "MIT"
    folder: Formula
    install: |
      bin.install "contrail"
    test: |
      system "#{bin}/contrail", "--version"

nfpms:
  - id: packages
    package_name: contrail
    vendor: Your Organization
    homepage: https://github.com/yourorg/contrail
    maintainer: Your Name <your@email.com>
    description: Workspace orchestration for Docker Compose
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin

release:
  github:
    owner: yourorg
    name: contrail
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  footer: |
    ## Installation

    ### Homebrew (macOS/Linux)
    ```bash
    brew install yourorg/tap/contrail
    ```

    ### Binary
    Download the appropriate binary for your platform from the assets below.

    ### From Source
    ```bash
    go install github.com/yourorg/contrail/cmd/contrail@v{{ .Version }}
    ```
