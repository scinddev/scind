# goreleaser.yaml
# GoReleaser configuration for Scind
#
# This file should be created based on the project's release requirements.
# See https://goreleaser.com/customization/ for configuration options.
#
# Example configuration:

# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: scind
    main: ./cmd/scind
    binary: scind
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: scind
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

brews:
  - name: scind
    repository:
      owner: yourorg
      name: homebrew-tap
    homepage: "https://github.com/yourorg/scind"
    description: "Workspace orchestration for Docker Compose"
    license: "MIT"
    folder: Formula
    install: |
      bin.install "scind"
      generate_completions_from_executable(bin/"scind", "completion")
    test: |
      system "#{bin}/scind", "--version"

nfpms:
  - id: packages
    package_name: scind
    vendor: Your Organization
    homepage: https://github.com/yourorg/scind
    maintainer: Your Name <your@email.com>
    description: Workspace orchestration for Docker Compose
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin

release:
  github:
    owner: yourorg
    name: scind
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  footer: |
    ## Installation

    ### Homebrew (macOS/Linux)
    ```bash
    brew install yourorg/tap/scind
    ```
    Shell completions are installed automatically with Homebrew.

    ### Binary
    Download the appropriate binary for your platform from the assets below.

    ### From Source
    ```bash
    go install github.com/yourorg/scind/cmd/scind@v{{ .Version }}
    ```

    ### Shell Completions

    Generate shell completions after installation:

    ```bash
    # Bash
    scind completion bash > ~/.local/share/bash-completion/completions/scind

    # Zsh
    scind completion zsh > "${fpath[1]}/_scind"

    # Fish
    scind completion fish > ~/.config/fish/completions/scind.fish
    ```
